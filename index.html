<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arabam.com Analytics Dashboard</title>
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div class="login-wrap" id="login">
<div class="login-card">
<h1>arabam.com</h1>
<p>Marketing Analytics Dashboard</p>
<input type="password" id="lpass" placeholder="Şifre" onkeydown="if(event.key==='Enter')login()">
<button onclick="login()">Giriş</button>
<div class="login-err" id="lerr"></div>
</div>
</div>

<div class="app" id="app">
<div class="sb">
<div class="sb-head"><h2>arabam.com</h2><small>ANALYTICS v2</small></div>
<nav class="sb-nav">
<div class="sb-item on" data-t="overview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Genel Bakış</span></div>
<div class="sb-item" data-t="trinksat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span>Trink Sat</span></div>
<div class="sb-item" data-t="listing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>Listing</span></div>
<div class="sb-item" data-t="costcpa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span>Cost & CPA</span></div>
<div class="sb-item" data-t="gads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg><span>Google Ads</span></div>
<div class="sb-item" data-t="channels"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><span>Kanal Karşılaştırma</span></div>
<div class="sb-item" data-t="analytics"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span>Channel IQ</span></div>
</nav>
<div class="sb-ft">ChoraLabs © 2026</div>
</div>

<div class="mn">
<div class="tb" id="topbar">
<div class="tb-row">
<div class="fg"><span class="fl">Platform</span><div class="fp" id="fp"><span class="on" data-v="all">Tüm</span><span data-v="W">Web</span><span data-v="A">App</span></div></div>
<div class="sep"></div>
<div class="fg"><span class="fl">Tip</span><div class="fp" id="fct"><span class="on" data-v="all">Tüm</span><span data-v="P">Paid</span><span data-v="N">Non-Paid</span></div></div>
<div class="sep"></div>
<div class="fg"><span class="fl">Kanal</span><div class="ms" id="chMs"><div class="ms-btn" onclick="toggleDD()">Tüm Kanallar</div><div class="ms-dd" id="chDd"></div></div></div>
<div class="sep"></div>
<div class="fg"><span class="fl">Çözünürlük</span><div class="fp" id="fres"><span data-v="daily">Günlük</span><span data-v="weekly">Haftalık</span><span class="on" data-v="monthly">Aylık</span></div></div>
</div>
<div class="tb-row">
<div class="fg"><span class="fl">Kampanya</span><select class="fs" id="fcpt"><option value="all">Tümü</option></select></div>
<div class="fg"><span class="fl">Ürün</span><select class="fs" id="fpr"><option value="all">Tümü</option></select></div>
<div class="fg"><span class="fl">Amaç</span><select class="fs" id="fob"><option value="all">Tümü</option></select></div>
<div class="sep"></div>
<div class="fg"><span class="fl">Dönem</span><select class="fs" id="fs1"></select><span style="color:var(--tx3);margin:0 2px">–</span><select class="fs" id="fs2"></select></div>
</div>
</div>

<div class="ct" id="ct">
<div class="tab on" id="t-overview"></div>
<div class="tab" id="t-trinksat"></div>
<div class="tab" id="t-listing"></div>
<div class="tab" id="t-costcpa"></div>
<div class="tab" id="t-gads"></div>
<div class="tab" id="t-channels"></div>
<div class="tab" id="t-analytics"></div>
</div>
</div>
</div>

<!-- DRAWER -->
<div id="chart-tip"></div>
<div class="drawer-overlay" id="drawerOv" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
<div class="drawer-head">
<div class="drawer-title" id="drawerTitle"></div>
<button class="drawer-close" onclick="closeDrawer()">✕</button>
</div>
<div class="drawer-body" id="drawerBody"></div>
</div>



<!-- AI INSIGHT MODAL -->
<div class="ai-modal-overlay" id="aiModalOverlay" onclick="if(event.target===this)closeAiModal()">
<div class="ai-modal">
<div class="ai-modal-head">
<div class="ai-modal-title" id="aiModalTitle"></div>
<button class="ai-modal-close" onclick="closeAiModal()">✕</button>
</div>
<div class="ai-modal-meta" id="aiModalMeta"></div>
<div class="ai-modal-body" id="aiModalBody"></div>
</div>
</div>

<script src="src/data.js"></script>
<script src="src/app.js"></script>
</body>
</html>
